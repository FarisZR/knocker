name: Run Tests

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - pyproject.toml
      - uv.lock
      - Dockerfile
      - src/**
      - dev/**
      - tests/**
  push:
    branches: [ "main" ]
    paths:
      - pyproject.toml
      - uv.lock
      - Dockerfile
      - src/**
      - dev/**
      - tests/**
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: 'pyproject.toml'

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true

    - name: Sync project dependencies
      run: uv sync --locked --all-groups

    - name: Run Ruff lint checks
      run: uv run --group lint ruff check .

    - name: Run Ruff format checks
      run: uv run --group lint ruff format --check .

    - name: Run ty checks
      run: uv run --group type ty check

    - name: Run unit tests
      run: uv run pytest

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Run docker compose stack
      run: docker compose -f dev/docker-compose.ci.yml up -d --build

    - name: Wait for services to be healthy
      run: sleep 10 # Simple wait for services to start

    - name: Make integration test script executable
      run: chmod +x dev/local_integration_tests.sh

    - name: Run integration tests
      run: ./dev/local_integration_tests.sh
