name: Run Tests

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - pyproject.toml
      - uv.lock
      - src/**
      - dev/**
      - tests/**
      - .github/workflows/tests.yml
  push:
    branches: [ "main" ]
    paths:
      - pyproject.toml
      - uv.lock
      - src/**
      - dev/**
      - tests/**
      - .github/workflows/tests.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Set up uv
      uses: astral-sh/setup-uv@v8
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --locked --dev

    - name: Run unit tests
      run: uv run pytest

    - name: Run Ruff lint
      run: uv run ruff check

    - name: Check Ruff formatting
      run: uv run ruff format --check

    - name: Run Ty type checks
      run: uv run ty check --output-format concise

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Run docker compose stack
      run: docker compose -f dev/docker-compose.ci.yml up -d --build

    - name: Wait for services to be healthy
      run: sleep 10 # Simple wait for services to start

    - name: Make integration test script executable
      run: chmod +x dev/local_integration_tests.sh

    - name: Run integration tests
      run: ./dev/local_integration_tests.sh
