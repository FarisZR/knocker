name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r src/requirements.txt

    - name: Run unit tests
      run: PYTHONPATH=src python3 -m pytest

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Run docker compose stack
      run: docker compose -f dev/docker-compose.yml up -d --build

    - name: Wait for services to be healthy
      run: sleep 10 # Simple wait for services to start

    - name: Display Docker logs
      run: |
        echo "--- Caddy Logs ---"
        docker logs dev-caddy-1
        echo "--- Knocker Logs ---"
        docker logs dev-knocker-1

    - name: Run integration test
      run: |
        echo "--- Testing Protected Route (should fail) ---"
        RESPONSE_CODE=$(curl -v -o /dev/null -w "%{http_code}" -H "X-Forwarded-For: 1.1.1.1" http://localhost/private)
        if [ "$RESPONSE_CODE" -eq 403 ]; then
          echo "✅ Protected route correctly returned 403"
        else
          echo "❌ Protected route returned $RESPONSE_CODE instead of 403"
          exit 1
        fi

        echo "--- Performing Knock ---"
        API_KEY=$(grep 'key: "CHANGE_ME_SUPER_SECRET_ADMIN_KEY"' ./knocker.example.yaml | awk -F '"' '{print $2}')
        KNOCK_RESPONSE=$(curl -v -X POST -H "X-Api-Key: $API_KEY" -H "X-Forwarded-For: 1.1.1.1" http://localhost/knock)
        if echo "$KNOCK_RESPONSE" | grep -q "whitelisted_entry"; then
          echo "✅ Knock successful"
        else
          echo "❌ Knock failed with response: $KNOCK_RESPONSE"
          exit 1
        fi

        echo "--- Testing Protected Route Again (should succeed) ---"
        SUCCESS_RESPONSE_CODE=$(curl -v -o /dev/null -w "%{http_code}" -H "X-Forwarded-For: 1.1.1.1" http://localhost/private)
        if [ "$SUCCESS_RESPONSE_CODE" -eq 200 ]; then
          echo "✅ Protected route correctly returned 200 after knock"
        else
          echo "❌ Protected route returned $SUCCESS_RESPONSE_CODE instead of 200"
          exit 1
        fi